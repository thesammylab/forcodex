<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>经济下行的心情就是大戏散场｜小红书卡片</title>
<style>
  :root{color-scheme:light;--ink:#111;--muted:#666;--line:#e5e5e5;--accent:#4A7A01}
  *{box-sizing:border-box}
  body{margin:0;background:#f7f7f7;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei UI",sans-serif}
  header{position:sticky;top:0;z-index:2;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px);padding:14px 16px}
  h1{margin:0;font-size:18px;line-height:1.35;font-weight:650}
  p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
  main{max-width:840px;margin:0 auto;padding:18px 12px 40px;display:grid;gap:18px}
  figure{margin:0;background:#fff;border:1px solid var(--line)}
  img{display:block;width:100%;height:auto}
  figcaption{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
  a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>经济下行的心情就是大戏散场，懒懒散散，各找各妈</h1>
  <p>Swiss Original Text · 17 张小红书 3:4 PNG</p>
</header>
<main>
  <script>
    for (let i = 1; i <= 17; i++) {
      const n = String(i).padStart(2, "0");
      document.write(`<figure><img src="${n}-xhs.png" alt="小红书卡片 ${n}"><figcaption><span>${n} / 17</span><a href="${n}-xhs.png">打开原图</a></figcaption></figure>`);
    }
  </script>
</main>
</body>
</html>
